<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Cockpit corrections</title>
<style>
  :root { --plum:#5C2D4A; --cream:#F5F0EA; --ink:#2E1A28; --muted:#7A6070; --line:#E5DAE0; --propbg:#FCF7FA; --propline:#D8B7CC;
          --del:#b00020; --delbg:#FBE9EC; --ins:#1E7A43; --insbg:#E7F5EC; --warn:#9A5B00; --warnbg:#FFF4E0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--cream); }
  header { background:var(--plum); color:#fff; padding:12px 18px; font-size:16px; font-weight:600; display:flex; align-items:center; gap:14px; }
  header .grow { flex:1; }
  header button { background:rgba(255,255,255,.16); color:#fff; border:none; padding:7px 12px; border-radius:7px; font-size:13px; cursor:pointer; }
  @media (hover:hover) { header button:hover { background:rgba(255,255,255,.28); } }

  #gate { max-width:360px; margin:80px auto; background:#fff; padding:24px; border-radius:12px; border:1px solid var(--line); }
  #gate label { font-size:14px; color:var(--muted); }
  #gate input { width:100%; padding:10px; font-size:15px; border:1px solid var(--line); border-radius:8px; margin:10px 0; }
  button.btn { background:var(--plum); color:#fff; border:none; padding:10px 16px; border-radius:8px; font-size:14px; cursor:pointer; }
  @media (hover:hover) { button.btn:hover { opacity:.92; } }

  #app { display:none; grid-template-columns:320px 1fr; height:calc(100vh - 47px); transition:grid-template-columns .18s ease; }
  #app.collapsed { grid-template-columns:0 1fr; }
  #app.collapsed #liste { display:none; }
  #liste { border-right:1px solid var(--line); overflow:auto; background:#fff; }
  .item { padding:12px 16px; border-bottom:1px solid var(--line); cursor:pointer; }
  @media (hover:hover) { .item:hover { background:var(--cream); } }
  .item.sel { background:#F3E8EF; }
  .item .from { font-size:13px; font-weight:600; }
  .item .subj { font-size:12px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip { display:inline-block; font-size:11px; background:#F3E8EF; color:var(--plum); padding:2px 8px; border-radius:10px; margin-top:6px; }
  .item .arch { float:right; font-size:11px; color:var(--muted); background:#fff; border:1px solid var(--line); border-radius:7px; padding:3px 9px; cursor:pointer; }
  @media (hover:hover) { .item .arch:hover { border-color:var(--plum); color:var(--plum); background:#F3E8EF; } }

  #detail { overflow:auto; padding:18px 24px 60px; }
  .meta { font-size:14px; margin-bottom:6px; }
  .meta b { color:var(--plum); }
  .demande { background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin:10px 0 18px; font-size:13.5px; line-height:1.55; white-space:pre-wrap; }
  .demande .label, .sectlabel { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .sectlabel { margin:22px 0 8px; font-weight:700; }

  .cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
  .col h3 { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 8px; }
  .col.prop h3 { color:var(--plum); }
  .fieldcard { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px; }
  .label { font-size:11px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px; }
  .val { font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
  .dim { color:#bbb; }
  /* Le textarea EST la carte du proposé (plus de carte dans une carte) et grandit tout seul a la hauteur du texte. */
  textarea.edit { display:block; width:100%; min-height:84px; font:inherit; font-size:14px; line-height:1.7; color:var(--ink); border:1px solid var(--propline); border-radius:10px; padding:11px 13px; background:#fff; resize:none; overflow:hidden; }
  textarea.edit:focus { outline:none; border-color:var(--plum); box-shadow:0 0 0 3px rgba(92,45,74,.10); }
  .preview { margin-top:10px; padding-top:10px; border-top:1px dashed var(--propline); }
  .preview .label { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  .d-del { color:var(--del); background:var(--delbg); text-decoration:line-through; border-radius:3px; padding:0 1px; }
  .d-ins { color:var(--ins); background:var(--insbg); border-radius:3px; padding:0 1px; }
  .legend { font-size:11px; color:var(--muted); margin:2px 0 0; }
  .legend .s { padding:0 4px; border-radius:3px; }

  .actions { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:6px 0 4px; }
  .mbtn { border:1px solid var(--plum); background:#fff; color:var(--plum); padding:10px 16px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; }
  @media (hover:hover) { .mbtn:hover { background:#F3E8EF; } }
  .mbtn.solid { background:var(--plum); color:#fff; }
  .ghost { background:#fff; border:1px solid var(--muted); color:var(--ink); padding:10px 14px; border-radius:9px; font-size:13px; cursor:pointer; }
  @media (hover:hover) { .ghost:hover { background:#F3E8EF; border-color:var(--plum); color:var(--plum); } }
  .hint { font-size:12px; color:var(--muted); }

  .regen { border:1px solid var(--propline); border-radius:10px; padding:12px 14px; background:#fff; margin:6px 0 4px; }
  .badge { display:inline-block; font-size:12px; font-weight:600; padding:3px 10px; border-radius:11px; }
  .badge.prod { background:var(--warnbg); color:var(--warn); }
  .badge.prete { background:var(--insbg); color:var(--ins); }
  .regen audio { width:100%; margin-top:10px; }
  .regen-lyrics { white-space:pre-wrap; font:14px/1.7 Georgia,serif; color:var(--ink); background:var(--insbg); border:1px solid var(--propline); border-radius:8px; padding:12px 14px; margin-top:10px; max-height:340px; overflow:auto; }

  .analyse { background:#fff; border:1px solid var(--line); border-radius:10px; padding:0 14px; margin:0 0 16px; }
  .analyse summary { cursor:pointer; padding:11px 0; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:700; }
  .analyse .val { padding:0 0 12px; font-size:13.5px; }
  .note { background:var(--propbg); border:1px solid var(--propline); border-radius:10px; padding:10px 14px; margin:8px 0 16px; font-size:13px; line-height:1.55; }

  .lexrow { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:6px 0; border-top:1px solid var(--line); }
  .lexrow:first-of-type { border-top:none; }
  .lexmot { min-width:120px; font-size:13.5px; font-weight:600; }
  .lexinput { flex:1; min-width:120px; font:inherit; font-size:13px; border:1px solid var(--line); border-radius:7px; padding:6px 9px; }
  .lexacts { display:flex; gap:6px; flex-wrap:wrap; }
  .lexacts .ghost { padding:5px 9px; font-size:12px; }
  .lexbadge { display:inline-block; font-size:10px; padding:1px 6px; border-radius:8px; margin-left:6px; }
  .lexbadge.ov { background:#F3E8EF; color:var(--plum); }
  .lexbadge.off { background:var(--delbg); color:var(--del); }
  .lexadd { margin-top:6px; }

  .send button[disabled] { opacity:.45; cursor:not-allowed; }
  .empty { color:var(--muted); padding:48px 24px; text-align:center; }
  .err { color:#b00020; font-size:13px; margin-top:8px; }
  #toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 18px; border-radius:9px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:50; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <button id="toggleBtn" onclick="toggleListe()" style="display:none">Masquer la liste</button>
  <span class="grow">Cockpit corrections</span>
</header>

<div id="gate">
  <label for="pass">Mot de passe</label>
  <input id="pass" type="password" autocomplete="current-password" autofocus>
  <button class="btn" onclick="entrer()">Entrer</button>
  <div id="gateErr" class="err"></div>
</div>

<div id="app">
  <div id="liste"></div>
  <div id="detail"><div class="empty">Choisis une conversation a gauche.</div></div>
</div>

<div id="toast"></div>

<script>
  var KEY_STORE = 'cockpit_key';
  var KEY = sessionStorage.getItem(KEY_STORE) || '';
  var CUR = null;   // detail courant (sert au recalcul du diff live)

  function esc(s){ return (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},2600); }

  async function api(params){
    var r = await fetch('/api/cockpit-data' + (params || ''), { headers: { 'x-cockpit-key': KEY } });
    if (r.status === 401) throw new Error('401');
    return r.json();
  }
  async function post(payload){
    var r = await fetch('/api/cockpit-data', { method:'POST', headers:{ 'x-cockpit-key':KEY, 'Content-Type':'application/json' }, body: JSON.stringify(payload) });
    var d = await r.json().catch(function(){ return {}; });
    return { ok:r.ok, status:r.status, d:d };
  }

  // ── DIFF AU MOT (miroir de _lib/word-diff.js, testé côté serveur) ────────────────────────────────
  function tokenize(s){ return String(s==null?'':s).replace(/\r\n/g,'\n').match(/\n|[^\s]+/g) || []; }
  function diffMots(a, b){
    var A=tokenize(a), B=tokenize(b), n=A.length, m=B.length;
    var dp=[]; for(var i=0;i<=n;i++){ dp[i]=new Int32Array(m+1); }
    for(var i=n-1;i>=0;i--) for(var j=m-1;j>=0;j--) dp[i][j]= A[i]===B[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
    var out=[], i=0, j=0;
    while(i<n && j<m){
      if(A[i]===B[j]){ out.push({op:'eq',text:A[i]}); i++; j++; }
      else if(dp[i+1][j]>=dp[i][j+1]){ out.push({op:'del',text:A[i]}); i++; }
      else { out.push({op:'ins',text:B[j]}); j++; }
    }
    while(i<n){ out.push({op:'del',text:A[i]}); i++; }
    while(j<m){ out.push({op:'ins',text:B[j]}); j++; }
    return out;
  }
  // side : 'actuel' (montre les retraits barrés) | 'propose' (montre les ajouts verts)
  function renderDiff(actuel, propose, side){
    var diff=diffMots(actuel, propose), html='', prevWord=false;
    for(var k=0;k<diff.length;k++){
      var op=diff[k].op, t=diff[k].text;
      if(side==='actuel' && op==='ins') continue;
      if(side==='propose' && op==='del') continue;
      if(t==='\n'){ html+='<br>'; prevWord=false; continue; }
      if(prevWord) html+=' ';
      var cls = op==='del' ? 'd-del' : (op==='ins' ? 'd-ins' : '');
      html += cls ? '<span class="'+cls+'">'+esc(t)+'</span>' : esc(t);
      prevWord=true;
    }
    return html || '<span class="dim">vide</span>';
  }

  async function entrer(){
    KEY = document.getElementById('pass').value.trim();
    try {
      var d = await api('');
      sessionStorage.setItem(KEY_STORE, KEY);
      ouvrirApp(); afficher(d);
    } catch (e) {
      document.getElementById('gateErr').textContent = 'Mot de passe invalide.';
    }
  }
  function ouvrirApp(){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    document.getElementById('toggleBtn').style.display = 'inline-block';
  }
  function toggleListe(){
    var app=document.getElementById('app'), b=document.getElementById('toggleBtn');
    app.classList.toggle('collapsed');
    b.textContent = app.classList.contains('collapsed') ? 'Afficher la liste' : 'Masquer la liste';
  }

  function afficher(d){
    if (d && d.ok === false) {
      document.getElementById('liste').innerHTML =
        '<div class="empty">Erreur Airtable (' + esc(d.status) + ' ' + esc(d.detail) + ').<br><br>' +
        'Verifie dans Netlify que <b>AIRTABLE_TOKEN</b> et <b>AIRTABLE_BASE_ID</b> sont actifs pour les Deploy Previews (ou teste sur la prod apres merge).</div>';
      return;
    }
    rendreListe((d && d.liste) || []);
  }
  function rendreListe(liste){
    var el = document.getElementById('liste');
    if (!liste.length) { el.innerHTML = '<div class="empty">Aucune conversation a traiter.</div>'; return; }
    el.innerHTML = liste.map(function (c) {
      return '<div class="item" data-id="' + esc(c.id) + '" onclick="ouvrir(\'' + c.id + '\', this)">' +
        '<button class="arch" title="Deja regle ailleurs : sortir de la liste" onclick="archiver(\'' + c.id + '\', event)">Archiver</button>' +
        '<div class="from">' + esc(c.expediteur) + '</div>' +
        '<div class="subj">' + esc(c.sujet) + '</div>' +
        (c.type_correction ? '<span class="chip">' + esc(c.type_correction) + '</span>' : '') +
        '</div>';
    }).join('');
  }

  // « Archiver » : la conversation est deja reglee ailleurs (ex. repondu depuis Gmail) -> on la sort de la file.
  async function archiver(id, ev){
    if (ev) ev.stopPropagation();
    var r = await post({ id:id, action:'archiver' });
    if (r.ok && r.d && r.d.ok){
      var node = document.querySelector('.item[data-id="' + id + '"]');
      if (node) node.parentNode.removeChild(node);
      if (CUR && CUR.id === id){ CUR = null; document.getElementById('detail').innerHTML = '<div class="empty">Conversation archivee.</div>'; }
      if (!document.querySelectorAll('.item').length) document.getElementById('liste').innerHTML = '<div class="empty">Aucune conversation a traiter.</div>';
      toast('Archive');
    } else { toast('Echec archivage'); }
  }

  // ── DÉTAIL ───────────────────────────────────────────────────────────────────────────────────────
  // 2 colonnes : Actuel (mots retires barres en rouge) | Propose (editable). Pas d'apercu empile dessous.
  function champEditable(titreActuel, valActuelle, titreProp, idTextarea, valProp, idAct){
    return '<div class="cols">' +
      '<div class="col">' +
        '<h3>' + titreActuel + ' <span class="legend"><span class="s d-del">retire</span></span></h3>' +
        '<div class="fieldcard"><div class="val" id="' + idAct + '">' + renderDiff(valActuelle, valProp, 'actuel') + '</div></div>' +
      '</div>' +
      '<div class="col prop">' +
        '<h3>' + titreProp + '</h3>' +
        '<textarea class="edit" id="' + idTextarea + '">' + esc(valProp) + '</textarea>' +
      '</div>' +
    '</div>';
  }

  // Recalcul live de la colonne Actuel (mots retires) + sauvegarde auto.
  function recalc(){
    if (!CUR) return;
    var par = document.getElementById('ta_paroles'), sty = document.getElementById('ta_style');
    if (par) document.getElementById('dp_act').innerHTML = renderDiff(CUR.paroles_actuelles, par.value, 'actuel');
    if (sty) document.getElementById('ds_act').innerHTML = renderDiff(CUR.prompt_style_actuel, sty.value, 'actuel');
    autoSave();
  }

  // Le textarea grandit a la hauteur de son contenu (lyrics longues lisibles d'un coup, zero scroll interne, zero poignee a tirer).
  function autoGrow(el){ if(!el) return; el.style.height='auto'; el.style.height=(el.scrollHeight+2)+'px'; }
  function wireGrow(id, extra){
    var el=document.getElementById(id); if(!el) return;
    autoGrow(el);
    el.addEventListener('input', function(){ if(extra) extra(); autoGrow(el); });
  }

  // Panneau « raisonnement IA » (analyse de la demande, surtout utile en prononciation). Repliable.
  function panneauAnalyse(analyse){
    if (!analyse) return '';
    return '<details class="analyse" open><summary>Raisonnement IA</summary><div class="val">' + esc(analyse) + '</div></details>';
  }

  // Recalcul live du diff phonetique (colonne Actuel).
  function recalcPhon(){
    if (!CUR) return;
    var ph = document.getElementById('ta_phon');
    if (ph) document.getElementById('ph_act').innerHTML = renderDiff(CUR.paroles_actuelles, ph.value, 'actuel');
  }

  // Bloc PRONONCIATION, affiche DANS la vue modif quand pertinent (gere aussi "prononciation + paroles" ensemble).
  function blocPrononciation(x){
    if (!x.est_prononciation) return '';
    var phonProp = x.lyrics_phonetique || x.paroles_actuelles;
    return '<div class="sectlabel">Prononciation &mdash; envoye a Suno</div>' +
      '<div class="note">Suno ne lit que du <b>texte</b> : pour corriger un mot mal prononce, on le <b>reecrit phonetiquement</b> dans ce qui est envoye a Suno. Les paroles AFFICHEES au client restent claires (le phonetique n\'apparait jamais a l\'ecran).</div>' +
      champEditable('Affichees (claires)', x.paroles_actuelles, 'Phonetique (Suno)', 'ta_phon', phonProp, 'ph_act') +
      '<div class="actions" id="pronoBar"><button class="mbtn" onclick="demanderProno()">Appliquer la prononciation (regenerer)</button></div>';
  }

  // Étape 4 : DICTIONNAIRE de prononciation du projet (voir/éditer/désactiver/override). Repliable.
  function renderLexique(x){
    var lex = x.lexique || [];
    var rows = lex.map(function(e){
      var badges = (e.override ? '<span class="lexbadge ov">override projet</span>' : '') +
                   (e.desactive ? '<span class="lexbadge off">desactive</span>' : '') +
                   (e.attempts > 1 ? '<span class="hint"> ' + esc(e.attempts) + ' essais</span>' : '');
      return '<div class="lexrow">' +
        '<div class="lexmot">' + esc(e.mot) + badges + '</div>' +
        '<input class="lexinput" id="lexp_' + esc(e.id) + '" value="' + esc(e.phonetique) + '">' +
        '<div class="lexacts">' +
          '<button class="ghost" onclick="lexEnregistrer(\'' + e.id + '\')">Enregistrer</button>' +
          '<button class="ghost" onclick="lexToggle(\'' + e.id + '\',' + (!e.desactive) + ')">' + (e.desactive ? 'Reactiver' : 'Desactiver') + '</button>' +
          '<button class="ghost" onclick="lexSupprimer(\'' + e.id + '\')">Supprimer</button>' +
        '</div>' +
      '</div>';
    }).join('');
    return '<details class="analyse lexdict"' + (lex.length ? ' open' : '') + '>' +
      '<summary>Dictionnaire de prononciation (' + lex.length + ')</summary>' +
      '<div class="val">' +
        '<div class="hint" style="margin-bottom:8px">Ces mots sont reecrits automatiquement quand les paroles partent a Suno (l\'affiche client reste clair). Global par langue (' + esc(x.langue || '') + '), override possible pour ce projet.</div>' +
        (rows || '<div class="hint">Aucune entree pour cette langue.</div>') +
        '<div class="lexrow lexadd">' +
          '<input class="lexinput" id="lex_mot" placeholder="mot (ex. Roxanne)">' +
          '<input class="lexinput" id="lex_phon" placeholder="reecriture (ex. Roksane)">' +
          '<label class="hint" style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="lex_override"> override ce projet</label>' +
          '<button class="mbtn" onclick="lexAjouter()">Ajouter</button>' +
        '</div>' +
      '</div>' +
    '</details>';
  }

  // ── SAUVEGARDE AUTOMATIQUE (debounce) : les editions se sauvent toutes seules, plus de bouton Enregistrer. ──
  var saveTimer=null;
  function setSaveStatut(t){ var el=document.getElementById('saveStatut'); if(el) el.textContent=t; }
  // Un champ propose EGAL a l'actuel = "pas de changement" -> enregistre vide (sert au bouton "Paroles uniquement").
  function champPropose(id, actuel){ var el=document.getElementById(id); if(!el) return undefined; return (el.value===actuel) ? '' : el.value; }
  function payloadSave(){
    var out={ id: CUR.id, action:'save' };
    var p=champPropose('ta_paroles', CUR.paroles_actuelles); if(p!==undefined) out.paroles_corrigees=p;
    var s=champPropose('ta_style', CUR.prompt_style_actuel); if(s!==undefined) out.prompt_style=s;
    var rp=document.getElementById('ta_reponse'); if(rp) out.reponse=rp.value;
    return out;
  }
  function autoSave(){
    if (!CUR) return;
    clearTimeout(saveTimer); setSaveStatut('Enregistrement...');
    saveTimer=setTimeout(async function(){ var r=await post(payloadSave()); setSaveStatut(r.ok?'Enregistre':'Echec sauvegarde'); }, 700);
  }
  async function flushSave(){ if(!CUR) return true; clearTimeout(saveTimer); var r=await post(payloadSave()); setSaveStatut(r.ok?'Enregistre':'Echec sauvegarde'); return r.ok; }

  // Confirmation DANS la page (remplace la popup du navigateur) : remplace le contenu d'une barre de boutons.
  function confirmInline(barId, message, labelOui, onOui){
    var bar=document.getElementById(barId); if(!bar) return;
    var prev=bar.innerHTML;
    bar.innerHTML = '<span class="hint">' + esc(message) + '</span>' +
      '<button class="mbtn solid" id="ciOui">' + esc(labelOui) + '</button>' +
      '<button class="ghost" id="ciNon">Annuler</button>';
    document.getElementById('ciOui').onclick = function(){ onOui(); };
    document.getElementById('ciNon').onclick = function(){ bar.innerHTML = prev; };
  }

  function blocRegen(regen){
    if (!regen || !regen.statut) return '';
    if (regen.statut === 'en_production') {
      return '<div class="sectlabel">Version regeneree</div>' +
        '<div class="regen"><span class="badge prod">Regeneration en cours</span>' +
        '<div class="hint" style="margin-top:8px">Suno produit la nouvelle version. L\'envoi au client est en pause : il se reactivera quand la version sera prete a revoir.</div></div>';
    }
    // prête
    return '<div class="sectlabel">Version regeneree a revoir' + (regen.no ? ' (V' + esc(regen.no) + ')' : '') + '</div>' +
      '<div class="regen"><span class="badge prete">Prete a revoir</span>' +
      (regen.titre ? ' <span class="hint">' + esc(regen.titre) + '</span>' : '') +
      (regen.audio_url ? '<audio controls preload="none" src="' + esc(regen.audio_url) + '"></audio>'
                       : '<div class="hint" style="margin-top:8px">Audio indisponible.</div>') +
      (regen.paroles ? '<div class="label" style="margin-top:12px">Paroles de cette version</div><div class="regen-lyrics">' + esc(regen.paroles) + '</div>' : '') +
      '</div>';
  }

  // Mode MESSAGE SIMPLE (categorie_ia != modification) : pas d'avant/apres, juste le message recu + la reponse IA a valider et envoyer.
  function rendreMessage(x){
    var courrielDefaut = x.reponse || x.brouillon_ia || '';
    document.getElementById('detail').innerHTML =
      '<div class="meta">' + esc(x.expediteur) + ' &middot; ' + esc(x.sujet) +
        (x.categorie_ia ? ' &middot; <b>' + esc(x.categorie_ia) + '</b>' : '') + '</div>' +
      (x.message ? '<div class="demande"><div class="label">Message du client</div>' + esc(x.message) + '</div>' : '') +
      '<div class="sectlabel">Reponse au client</div>' +
      '<div class="hint" style="margin-bottom:8px">Aucune modification de chanson ici : relis le brouillon de l\'IA et envoie. (Sauvegarde automatique.)</div>' +
      '<div class="send">' +
        '<textarea class="edit short" id="ta_reponse">' + esc(courrielDefaut) + '</textarea>' +
        '<div class="actions" id="sendBar" style="margin-top:10px">' +
          '<button class="mbtn solid" id="sendBtn" onclick="demanderEnvoyer()">Envoyer au client</button>' +
          '<span id="saveStatut" class="hint"></span>' +
        '</div>' +
      '</div>';
    wireGrow('ta_reponse', autoSave);
  }

  async function ouvrir(id, node){
    stopRegenPoll();   // on change d'item -> on coupe un eventuel sondage de regeneration en cours
    var items = document.querySelectorAll('.item');
    for (var i = 0; i < items.length; i++) items[i].classList.remove('sel');
    if (node) node.classList.add('sel');
    document.getElementById('detail').innerHTML = '<div class="empty">Chargement...</div>';
    var d = await api('?id=' + encodeURIComponent(id));
    var x = (d && d.detail) || {};
    CUR = x;

    if (x.mode === 'message') { rendreMessage(x); return; }
    // Plus de vue 'prononciation' separee : c'est un BLOC dans la vue modif (gere aussi le cas combine paroles+prononciation).

    var enRege = !!(x.regen && x.regen.statut === 'en_production');
    var courrielDefaut = x.reponse || x.brouillon_ia || '';
    // Pas encore de proposition IA ? On part des valeurs ACTUELLES (editables). Diff vide tant que rien n'est edite.
    var parProp = x.paroles_corrigees || x.paroles_actuelles;
    var styProp = x.prompt_style       || x.prompt_style_actuel;

    document.getElementById('detail').innerHTML =
      '<div class="meta">' + esc(x.expediteur) + ' &middot; ' + esc(x.sujet) +
        (x.type_correction ? ' &middot; <b>' + esc(x.type_correction) + '</b>' : '') + '</div>' +
      (x.message ? '<div class="demande"><div class="label">Demande du client</div>' + esc(x.message) + '</div>' : '') +
      panneauAnalyse(x.analyse_ia) +

      '<div class="sectlabel">Paroles &mdash; actuel | propose (editable)</div>' +
      champEditable('Actuel (en ligne)', x.paroles_actuelles, 'Propose (editable)', 'ta_paroles', parProp, 'dp_act') +

      '<div class="sectlabel">Style &mdash; actuel | propose (editable)</div>' +
      champEditable('Actuel (en ligne)', x.prompt_style_actuel, 'Propose (editable)', 'ta_style', styProp, 'ds_act') +

      (x.voix ? '<div class="fieldcard" style="max-width:520px"><div class="label">Voix</div><div class="val">' + esc(x.voix) + '</div></div>' : '') +

      blocPrononciation(x) +
      renderLexique(x) +

      '<div class="sectlabel">Regenerer</div>' +
      '<div class="hint" style="margin-bottom:8px">Choisis la methode (rien n\'est pre-selectionne). Tes editions sont deja enregistrees (auto).</div>' +
      '<div class="actions" id="applyBar">' +
        '<button class="mbtn" onclick="demanderAppliquer(\'rege\')">Nouvelle melodie</button>' +
        '<button class="mbtn" onclick="demanderAppliquer(\'cover\')">Garder la melodie (cover)</button>' +
        '<button class="mbtn" onclick="demanderAppliquer(\'paroles\')">Paroles uniquement</button>' +
      '</div>' +

      blocRegen(x.regen) +

      '<div class="sectlabel">Reponse au client</div>' +
      '<div class="hint" style="margin-bottom:8px">Reponse finale OU demande de clarification : envoyer un courriel ne declenche AUCUNE regeneration.</div>' +
      '<div class="send">' +
        '<textarea class="edit short" id="ta_reponse">' + esc(courrielDefaut) + '</textarea>' +
        '<div class="actions" id="sendBar" style="margin-top:10px">' +
          '<button class="mbtn solid" id="sendBtn" onclick="demanderEnvoyer()"' + (enRege ? ' disabled' : '') + '>Envoyer au client</button>' +
          '<span class="hint">' + (enRege ? 'En pause : version en cours de regeneration.' : '') + '</span>' +
          '<span id="saveStatut" class="hint" style="margin-left:auto"></span>' +
        '</div>' +
      '</div>';

    wireGrow('ta_paroles', recalc);
    wireGrow('ta_style', recalc);
    if (x.est_prononciation) wireGrow('ta_phon', recalcPhon);
    wireGrow('ta_reponse', autoSave);
    if (enRege) pollRegen(id);   // item deja en regeneration -> l'audio + les paroles s'afficheront des que pret
  }

  async function appliquer(methode){
    if (!CUR) return;
    await flushSave();
    var r = await post({ id: CUR.id, action: 'appliquer', methode: methode });   // le backend lit les editions deja sauvees
    var bar = document.getElementById('applyBar');
    if (r.ok) { toast('Regeneration lancee.'); if (bar) bar.innerHTML = '<span class="hint">Regeneration lancee (Suno ~1 min). La version prete s\'affichera ici automatiquement.</span>'; pollRegen(CUR.id); }
    else { toast('Echec.'); if (bar) bar.innerHTML = '<span class="err">Echec : ' + esc((r.d && r.d.error) || r.status) + '</span>'; }
  }
  function demanderAppliquer(methode){
    var lib = methode === 'rege' ? 'nouvelle melodie' : (methode === 'paroles' ? 'paroles uniquement (melodie + style inchanges)' : 'garder la melodie');
    confirmInline('applyBar', 'Regenerer (' + lib + ') ?', 'Oui, regenerer', function(){ appliquer(methode); });
  }

  // Auto-rafraichissement apres une regeneration : on sonde la version jusqu'a ce que Suno la livre
  // ('prête'), puis on recharge le detail -> l'audio + les paroles de la nouvelle version apparaissent
  // tout seuls (plus besoin de recharger la page). S'arrete si l'admin change d'item ou apres ~10 min.
  var regenPoll = null;
  function stopRegenPoll(){ if (regenPoll) { clearInterval(regenPoll); regenPoll = null; } }
  function pollRegen(id){
    stopRegenPoll();
    if (!id) return;
    var tries = 0;
    regenPoll = setInterval(async function(){
      tries++;
      if (tries > 40 || !CUR || CUR.id !== id) { stopRegenPoll(); return; }   // ~10 min max, ou item change
      var d = await api('?id=' + encodeURIComponent(id));
      var rg = d && d.detail && d.detail.regen;
      if (rg && rg.statut === 'prête') { stopRegenPoll(); rechargerDetail(); toast('Nouvelle version prete a revoir.'); }
    }, 15000);
  }

  // ── DICTIONNAIRE de prononciation (étape 4) : ajouter / éditer / (dés)activer / supprimer une entrée. ──
  function rechargerDetail(){ if (CUR) ouvrir(CUR.id, document.querySelector('.item.sel')); }
  async function lexAjouter(){
    if (!CUR) return;
    var mot = (document.getElementById('lex_mot').value || '').trim();
    var phon = (document.getElementById('lex_phon').value || '').trim();
    var scope = document.getElementById('lex_override').checked ? 'projet' : 'global';
    if (!mot || !phon) { toast('Mot et reecriture requis.'); return; }
    var r = await post({ id: CUR.id, action: 'lex_save', mot: mot, phonetique: phon, scope: scope });
    if (r.ok) { toast('Ajoute au dictionnaire.'); rechargerDetail(); } else { toast('Echec.'); }
  }
  async function lexEnregistrer(recId){
    if (!CUR) return;
    var phon = (document.getElementById('lexp_' + recId).value || '').trim();
    var r = await post({ id: CUR.id, action: 'lex_save', recId: recId, phonetique: phon });
    toast(r.ok ? 'Enregistre.' : 'Echec.');
  }
  async function lexToggle(recId, desactive){
    if (!CUR) return;
    var r = await post({ id: CUR.id, action: 'lex_save', recId: recId, desactive: desactive });
    if (r.ok) { toast(desactive ? 'Desactive.' : 'Reactive.'); rechargerDetail(); } else { toast('Echec.'); }
  }
  async function lexSupprimer(recId){
    if (!CUR) return;
    if (!confirm('Supprimer cette entree du dictionnaire ?')) return;
    var r = await post({ id: CUR.id, action: 'lex_delete', recId: recId });
    if (r.ok) { toast('Supprime.'); rechargerDetail(); } else { toast('Echec.'); }
  }

  async function appliquerProno(){
    if (!CUR) return;
    var phon = document.getElementById('ta_phon').value;
    var r = await post({ id: CUR.id, action: 'appliquer_prononciation', lyrics_phonetique: phon });
    var bar = document.getElementById('pronoBar');
    if (r.ok) { toast('Regeneration lancee (prononciation).'); if (bar) bar.innerHTML = '<span class="hint">Regeneration lancee (Suno ~1 min). La version prete s\'affichera ici automatiquement.</span>'; pollRegen(CUR.id); }
    else { toast('Echec.'); if (bar) bar.innerHTML = '<span class="err">Echec : ' + esc((r.d && r.d.error) || r.status) + '</span>'; }
  }
  function demanderProno(){
    confirmInline('pronoBar', 'Regenerer avec le son corrige (paroles affichees inchangees) ?', 'Oui, regenerer', appliquerProno);
  }

  async function envoyer(){
    if (!CUR) return;
    await flushSave();
    var rep = document.getElementById('ta_reponse').value;
    var r = await post({ id: CUR.id, action: 'envoyer', reponse: rep });
    var b = document.getElementById('sendBtn');
    if (r.ok) { toast('Reponse programmee (~1 min).'); if (b) b.disabled = true; }
    else if (r.status === 409 && r.d && r.d.error === 'rege_en_cours') { toast('Envoi en pause : version en cours de regeneration.'); if (b) b.disabled = true; }
    else { toast('Echec de l\'envoi.'); }
  }
  function demanderEnvoyer(){
    confirmInline('sendBar', 'Envoyer ce courriel au client ?', 'Oui, envoyer', envoyer);
  }

  if (KEY) {
    api('').then(function (d) { ouvrirApp(); afficher(d); })
           .catch(function () { /* clef invalide -> on laisse l'ecran mot de passe */ });
  }
</script>
</body>
</html>
