<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>On écrit tes paroles · Chanson Mémoire</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dznxfzsdt/image/upload/v1750366857/Sans_titre_Logo_1_ykaidx.png">
<!-- Design : funnel v2 (maquette « Attente - paroles »), charte Newsreader + Work Sans.
     Sonde GET /api/projet toutes les 2,5 s ; redirige vers /revision dès que les paroles
     existent. Après ~2 min : message doux + bouton Réessayer (retry idempotent). -->
<script src="/js/cm-token.js"></script>
<script src="/js/cm-sentry.js"></script>
<script src="/js/cm-attrib.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F3EE; --surface:#FDFBF8; --ink:#2B2530; --muted:#8A7F88; --line:#EAE2E6;
    --accent:#7C6591; --accent-deep:#4A3855; --soft:#EFE7F0;
  }
  *{box-sizing:border-box}
  body{
    margin:0;color:var(--ink);font-family:'Work Sans',system-ui,sans-serif;min-height:100vh;
    background:
      radial-gradient(420px 300px at 10% -40px, #EFE7F0 0%, rgba(239,231,240,0) 62%),
      radial-gradient(420px 320px at 96% 0px, #F5EBE2 0%, rgba(245,235,226,0) 58%),
      var(--bg);
  }
  .page{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:22px}
  .logo{display:flex;justify-content:center;padding-top:6px}
  .logo img{height:20px;width:auto;opacity:.7}
  .centre{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:40px 24px 80px}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.06)}}
  .anneau-zone{position:relative;display:flex;align-items:center;justify-content:center}
  .halo{position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(124,101,145,.22),transparent 70%);animation:breathe 3.2s ease-in-out infinite}
  .anneau{width:74px;height:74px;border-radius:50%;background:conic-gradient(var(--accent) 0deg 110deg,var(--soft) 110deg 360deg);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 0);mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 0);animation:spin 1.05s linear infinite}

  h1{font-family:'Newsreader',serif;font-weight:600;font-size:27px;margin:0}
  .sous{font:500 15px/1.6 'Work Sans';color:var(--muted);margin:0}

  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .lignes{width:100%;max-width:250px;display:flex;flex-direction:column;gap:11px;margin-top:6px}
  .shim{height:12px;border-radius:6px;background:linear-gradient(90deg,#ECE4E0 25%,#F7F1EC 40%,#ECE4E0 60%);background-size:300% 100%;animation:shimmer 1.5s linear infinite}

  .points{display:flex;gap:7px;margin-top:2px}
  .points span{width:7px;height:7px;border-radius:50%;background:#D8CFE0}
  .points span:first-child{background:var(--accent)}

  .patience,.probleme{display:none;max-width:380px}
  .patience.show,.probleme.show{display:block}
  .patience p,.probleme p{font:500 13.5px/1.6 'Work Sans';color:var(--muted);margin:0 0 12px}
  .btn{
    border:none;border-radius:14px;padding:13px 22px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;
    font:700 14.5px 'Work Sans';box-shadow:0 10px 24px rgba(74,56,85,.2);
  }
  @media (hover:hover){ .btn:hover{filter:brightness(1.06)} }
  .btn[disabled]{opacity:.6;cursor:default}
</style>
</head>
<body>
<div class="page">
  <div class="logo"><img src="https://res.cloudinary.com/dznxfzsdt/image/upload/v1750366857/Sans_titre_Logo_1_ykaidx.png" alt="Chanson Mémoire"></div>
  <div class="centre">
    <div class="anneau-zone" aria-hidden="true"><div class="halo"></div><div class="anneau"></div></div>
    <h1 id="titre">On écrit tes paroles…</h1>
    <p class="sous" id="sous">Chaque mot vient de tes souvenirs.<br>Environ 30 secondes.</p>
    <div class="lignes" aria-hidden="true">
      <div class="shim" style="width:92%"></div><div class="shim" style="width:74%"></div>
      <div class="shim" style="width:86%"></div><div class="shim" style="width:58%"></div>
    </div>
    <div class="points" aria-hidden="true"><span></span><span></span><span></span></div>

    <div class="patience" id="patience" role="status">
      <p>Ça prend un peu plus de temps que d’habitude. On continue d’y travailler : tu peux rester ici, ou relancer.</p>
      <button class="btn" id="btn-relancer" type="button">Relancer l’écriture</button>
    </div>
    <div class="probleme" id="probleme" role="alert">
      <p id="probleme-texte">Ce lien ne correspond à aucun projet. Vérifie le lien reçu, ou recommence le questionnaire.</p>
      <button class="btn" type="button" onclick="window.location.href='/souvenirs'">Recommencer</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var UUID_V4=/^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
  /* cm-token.js a déjà mis le token en réserve et nettoyé l’URL (anti-fuite Meta). */
  var token=((window.cmToken?window.cmToken():(new URLSearchParams(window.location.search).get('id')))||'').trim();
  var elPatience=document.getElementById('patience');
  var elProbleme=document.getElementById('probleme');

  if(!UUID_V4.test(token)){ elProbleme.classList.add('show'); return; }

  var INTERVALLE=2500, PATIENCE_APRES=120000; /* ~2 min avant d’offrir « relancer » */
  var debut=Date.now(), echecsReseau=0, arret=false;

  function sonder(){
    if(arret) return;
    fetch('/api/projet?id='+encodeURIComponent(token),{headers:{'accept':'application/json'}})
      .then(function(r){
        if(r.status===404){ arret=true; elProbleme.classList.add('show'); return null; }
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .then(function(p){
        if(!p) return;
        echecsReseau=0;
        /* Projet déjà acheté : cette page n’est plus la bonne étape. */
        if(p.statut_commercial && p.statut_commercial!=='preview_only'){
          arret=true; window.location.href='/espace-client?id='+encodeURIComponent(token); return;
        }
        if(p.a_paroles){ arret=true; window.location.href='/revision?id='+encodeURIComponent(token); return; }
        if(Date.now()-debut>PATIENCE_APRES) elPatience.classList.add('show');
      })
      .catch(function(){
        echecsReseau++;
        /* Réseau instable toléré ; au-delà de 8 échecs consécutifs on le dit. */
        if(echecsReseau>=8){
          elPatience.classList.add('show');
          document.querySelector('#patience p').textContent='La connexion semble instable. On continue d’essayer ; tu peux aussi relancer.';
        }
      })
      .finally(function(){ if(!arret) setTimeout(sonder,INTERVALLE); });
  }

  document.getElementById('btn-relancer').addEventListener('click',function(){
    var b=this, texteP=document.querySelector('#patience p');
    b.disabled=true; b.textContent='Relance en cours…';
    /* Retry idempotent : sans modifications, le serveur ne régénère que s’il n’y a pas
       déjà des paroles valides. Échec = retour VISIBLE (jamais de silence). */
    fetch('/api/revision-paroles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token})})
      .then(function(r){
        if(!r.ok&&r.status!==202) throw new Error('HTTP '+r.status);
        texteP.textContent='C’est relancé. Les paroles arrivent d’ici une trentaine de secondes.';
      })
      .catch(function(){
        texteP.textContent='La relance n’a pas fonctionné. Attends un instant puis réessaie ; si ça persiste, écris-nous et on s’en occupe.';
      })
      .finally(function(){ setTimeout(function(){ b.disabled=false; b.textContent='Relancer l’écriture'; },8000); });
  });

  sonder();
})();
</script>
<script src="/js/cm-pixel.js" defer></script>
</body>
</html>
