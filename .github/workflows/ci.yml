name: CI

# Tourne sur chaque PR (et push de branche) AVANT le merge -> bloque un changement qui casse
# la syntaxe d'une fonction ou un test. Premier filet de securite « avant la prod ».
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Syntaxe de toutes les Netlify Functions (node --check)
        run: |
          set -e
          for f in netlify/functions/*.js netlify/functions/_lib/*.js; do
            echo "check $f"
            node --check "$f"
          done

      - name: Tests unitaires (node:test)
        run: node --test tests/*.test.js

  # Fondations Supabase (plan v2 Phase 1) : types, contrat d'observabilité, dérive de
  # schéma, MIGRATIONS DEPUIS ZÉRO sur un Postgres éphémère (bloquant), smoke test.
  # Aucun secret ici : la base est jetable, créée dans le runner.
  fondations-supabase:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cm_ci
        ports:
          # Deux ports vers le MÊME Postgres : 5432 = chemin « migrations » (drizzle-kit),
          # 6543 = chemin « runtime » (_lib/db.ts refuse :5432, comme en prod où 6543 est
          # le pooler transaction). Les gardes-fous restent stricts des deux côtés.
          - 5432:5432
          - 6543:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cm_ci
      SUPABASE_DB_URL: postgres://postgres:postgres@localhost:6543/cm_ci
      GENERATE_LYRICS_SECRET: secret-ci
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Dépendances
        run: npm ci

      - name: Types TypeScript (build cassé si désync avec le schéma)
        run: npm run typecheck

      - name: Contrat d'observabilité (wrapper obligatoire, zéro catch vide)
        run: node scripts/verifier-wrapper.mjs

      - name: Dérive schéma vs migrations (drizzle-kit check)
        run: npm run db:check

      - name: Migrations depuis ZÉRO sur Postgres éphémère (bloquant)
        run: npm run db:migrate

      - name: Preuve — tables créées (information_schema)
        run: node scripts/lister-tables.mjs

      - name: Smoke — les contraintes échouent FORT (doublon rejeté, FK, CHECK, audit, soft-delete)
        run: node scripts/smoke-db.mjs

      # Après les migrations : les tests d'intégration (suffixe .integration) frappent la
      # vraie base éphémère via le chemin runtime (6543). Sans SUPABASE_DB_URL, ils se
      # sautent d'eux-mêmes (exécution locale).
      - name: Tests unitaires + intégration TypeScript
        run: npm run test:ts
