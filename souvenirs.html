<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>Partage tes souvenirs · Chanson Mémoire</title>
<meta name="description" content="Réponds à quelques questions douces sur la personne à honorer : nous transformons tes souvenirs en chanson.">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dznxfzsdt/image/upload/v1750366857/Sans_titre_Logo_1_ykaidx.png">
<!-- Design : funnel v2 (maquette Claude Design « Souvenirs (Survey) »), charte unifiée
     Newsreader + Work Sans (tokens de l’espace client). Backend : Supabase (/api/survey). -->
<script src="/js/cm-sentry.js"></script>
<script src="/js/cm-attrib.js"></script>
<script src="/js/cm-name.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Design system unifié (espace client) */
    --bg:#F7F3EE; --surface:#FDFBF8; --ink:#2B2530; --muted:#8A7F88; --line:#EAE2E6;
    --accent:#7C6591; --accent-deep:#4A3855; --soft:#EFE7F0; --gold:#C79A4B;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;color:var(--ink);font-family:'Work Sans',system-ui,sans-serif;min-height:100vh;
    background:
      radial-gradient(420px 300px at 10% -40px, #EFE7F0 0%, rgba(239,231,240,0) 62%),
      radial-gradient(420px 320px at 96% 0px, #F5EBE2 0%, rgba(245,235,226,0) 58%),
      var(--bg);
  }
  .page{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:18px 22px 30px}

  /* En-tête : retour + progression + logo (structure de la maquette) */
  .haut{display:flex;align-items:center;gap:14px}
  .btn-retour{
    width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);background:rgba(255,255,255,.72);
    color:var(--ink);font-size:17px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;
  }
  @media (hover:hover){ .btn-retour:hover{border-color:var(--accent);color:var(--accent)} }
  .btn-retour[disabled]{opacity:0;pointer-events:none}
  .piste{flex:1;height:6px;border-radius:99px;background:var(--soft);overflow:hidden}
  .barre{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-deep));transition:width .35s ease}
  .logo{height:18px;width:auto;opacity:.75}

  .chip{font:800 11px 'Work Sans';letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:18px 0 0}
  h1{font-family:'Newsreader',serif;font-weight:600;font-size:30px;line-height:1.12;margin:8px 0 0}
  .aide{font:500 14.5px/1.55 'Work Sans';color:var(--muted);margin:10px 0 0}

  .tip{display:flex;align-items:flex-start;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:16px 0 0}
  .tip[hidden]{display:none}
  .tip .i{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font:800 11px 'Work Sans';display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
  .tip .t{font:800 12.5px 'Work Sans';color:var(--accent-deep);margin-bottom:5px}
  .tip li{font:500 12.5px/1.5 'Work Sans';color:var(--accent-deep);margin:3px 0}
  .tip ul{margin:0;padding-left:16px}

  .zone{margin:18px 0 0;flex:1;display:flex;flex-direction:column;gap:10px}
  input[type=text],input[type=email],textarea,select{
    width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;
    font:500 16px 'Work Sans';color:var(--ink);outline:none;
  }
  textarea{min-height:132px;line-height:1.55;resize:vertical}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}

  .choix{display:flex;flex-direction:column;gap:9px}
  .choix.grille{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .carte{
    position:relative;display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:16px;padding:13px 14px;cursor:pointer;font:600 14.5px 'Work Sans';color:var(--ink);
    transition:border-color .15s ease, background .15s ease;
  }
  @media (hover:hover){ .carte:hover{border-color:var(--accent)} }
  .carte input{position:absolute;opacity:0;pointer-events:none}
  .carte .sous{display:block;font:500 12.5px/1.4 'Work Sans';color:var(--muted);margin-top:2px}
  .carte.actif{border-color:var(--accent);background:var(--soft)}

  .note,.erreur{display:none;font:500 12.5px/1.45 'Work Sans';border-radius:12px;padding:9px 12px;margin-bottom:10px}
  .note.show,.erreur.show{display:block}
  .note{background:#FBF4E6;border:1px solid #EBD9B4;color:#7A5E22;margin-top:8px;margin-bottom:0}
  .erreur{background:#F9E9E7;border:1px solid #ECC8C2;color:#8C3B2E}

  .bas{margin-top:22px}
  .btn{
    width:100%;border:none;border-radius:16px;padding:16px 18px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;
    font:700 16px 'Work Sans';letter-spacing:.01em;box-shadow:0 10px 24px rgba(74,56,85,.22);
  }
  .btn[disabled]{opacity:.6;cursor:default}
  @media (hover:hover){ .btn:not([disabled]):hover{filter:brightness(1.06)} }
  .btn-passer{width:100%;margin-top:10px;background:none;border:none;color:var(--muted);font:600 13.5px 'Work Sans';cursor:pointer;text-decoration:underline;text-underline-offset:3px}

  .legal{font:500 12px/1.5 'Work Sans';color:var(--muted)}
  .legal a{color:var(--accent)}
  .consent{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;cursor:pointer}
  .consent input{margin-top:3px;flex:none}
  .consent span{font:500 13px/1.5 'Work Sans';color:var(--ink)}
  .consent a{color:var(--accent)}

  @media (min-width:700px){
    .page{padding-top:34px}
    h1{font-size:34px}
  }
</style>
</head>
<body>

<!-- Backup Netlify Forms (filet si /api/survey échoue) : champs de CONTENU seulement,
     jamais l’attribution (Loi 25). Même form-name que l’existant. -->
<form name="chanson-memoire-survey" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="token"><input type="text" name="song_type">
  <input type="text" name="deceased_name"><input type="text" name="relationship">
  <input type="text" name="music_style"><input type="text" name="voice"><input type="text" name="mood">
  <input type="text" name="language"><input type="text" name="what_made_unique">
  <input type="text" name="memories"><input type="text" name="memory_to_keep">
  <input type="email" name="email"><input type="text" name="consentement">
</form>

<div class="page">
  <div class="haut">
    <button class="btn-retour" id="btn-retour" type="button" aria-label="Étape précédente">←</button>
    <div class="piste" role="progressbar" aria-valuemin="1" aria-valuemax="10" aria-valuenow="1" aria-label="Progression du questionnaire">
      <div class="barre" id="barre"></div>
    </div>
    <img class="logo" src="https://res.cloudinary.com/dznxfzsdt/image/upload/v1750366857/Sans_titre_Logo_1_ykaidx.png" alt="Chanson Mémoire">
  </div>

  <p class="chip" id="chip"></p>
  <h1 id="titre"></h1>
  <p class="aide" id="aide"></p>
  <div class="tip" id="tip" hidden>
    <span class="i">i</span>
    <div><div class="t" id="tip-titre"></div><ul id="tip-items"></ul></div>
  </div>

  <div class="zone" id="zone"></div>

  <div class="bas">
    <div class="erreur" id="erreur" role="alert"></div>
    <button class="btn" id="btn-suivant" type="button">Continuer</button>
    <button class="btn-passer" id="btn-passer" type="button" hidden>Passer cette question</button>
  </div>
</div>

<script>
(function(){
  'use strict';
  var UUID_V4=/^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
  var MIN_CHARS=3;

  /* ── TOKEN : clé de tout le parcours. ?id=UUID (retour depuis l’attente) = réutilisé. ── */
  var idParam=new URLSearchParams(window.location.search).get('id')||'';
  var token=UUID_V4.test(idParam)?idParam:((window.crypto&&crypto.randomUUID)?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}));

  /* ── Attribution first/last-touch (paniers cm-attrib.js) — mêmes clés que le legacy. ── */
  function cmTouch(k){try{return JSON.parse(localStorage.getItem(k)||'{}')||{};}catch(e){return {};}}
  function getParam(n){return (new URLSearchParams(window.location.search).get(n)||'').trim();}
  function getCookie(n){var m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?m.pop():'';}
  var cmFirst=cmTouch('cm_first_touch'), cmLast=cmTouch('cm_last_touch');
  function cmF(o,n){return (o&&o[n])||getParam(n)||'';}

  var data={
    token:token, song_type:'hommage', deceased_name:'', relationship:'', music_style:'',
    voice:'', mood:'', language:'fr-CA', what_made_unique:'', memories:'', memory_to_keep:'',
    email:'', consentement:false,
    fbclid:(cmLast.fbclid||cmFirst.fbclid||getParam('fbclid')), fbp:getCookie('_fbp'), fbc:getCookie('_fbc'),
    utm_source:cmF(cmFirst,'utm_source'), utm_medium:cmF(cmFirst,'utm_medium'),
    utm_campaign:cmF(cmFirst,'utm_campaign'), utm_content:cmF(cmFirst,'utm_content'),
    utm_term:cmF(cmFirst,'utm_term'), landing_page:cmFirst.landing_page||window.location.pathname,
    first_touch_at:cmFirst.at||'',
    last_utm_source:cmF(cmLast,'utm_source'), last_utm_medium:cmF(cmLast,'utm_medium'),
    last_utm_campaign:cmF(cmLast,'utm_campaign'), last_utm_content:cmF(cmLast,'utm_content'),
    last_utm_term:cmF(cmLast,'utm_term'), last_landing_page:cmLast.landing_page||window.location.pathname,
    last_touch_at:cmLast.at||''
  };

  /* ── LES 10 ÉTAPES (mêmes questions, mêmes valeurs que le funnel prouvé) ── */
  var STEPS=[
    { section:'La chanson', type:'choice', cle:'song_type', requis:true,
      titre:'Quelle chanson veux-tu créer ?', aide:'Les questions s’adaptent à ton choix.',
      options:[
        {v:'hommage', l:'Un hommage', sous:'à la mémoire d’une personne qui nous a quittés'},
        {v:'cadeau',  l:'Un cadeau',  sous:'pour une personne bien vivante'}
      ] },
    { section:'La personne', type:'name', cle:'deceased_name', requis:true,
      titre:function(){return data.song_type==='cadeau'?'Pour qui est ce cadeau ?':'À la mémoire de qui ?';},
      aide:'Son prénom (ou son surnom) : celui qu’on chantera.',
      placeholder:'Ex. : Jean, Maman, Grand-maman Rita…',
      noteMots:'Juste le nom ici : les souvenirs viennent un peu plus loin.' },
    { section:'La personne', type:'choice', cle:'relationship', requis:true,
      titre:function(){return data.song_type==='cadeau'?'Cette personne est…':'Cette personne était…';},
      aide:'Le lien entre la personne qui offre et la personne honorée.',
      options:[
        {v:'Parent',l:'Parent'},{v:'Grand-parent',l:'Grand-parent'},{v:'Enfant',l:'Enfant'},
        {v:'Partenaire / conjoint(e)',l:'Partenaire / conjoint(e)'},{v:'Ami(e) proche',l:'Ami(e) proche'},
        {v:'Animal de compagnie',l:'Animal de compagnie'},{v:'Quelqu’un d’autre',l:'Quelqu’un d’autre'}
      ], grille:true },
    { section:'La musique', type:'choice', cle:'music_style', requis:true,
      titre:'Quel style musical lui ressemble ?', aide:'Choisis ce qui lui aurait plu, à elle ou lui.',
      options:[
        {v:'Douce Mélodie',l:'Douce mélodie'},{v:'Acoustique',l:'Acoustique'},{v:'Pop',l:'Pop'},
        {v:'Country',l:'Country'},{v:'Jazz',l:'Jazz'},{v:'R&B',l:'R&B'},{v:'Rock',l:'Rock'},
        {v:'Hip-Hop',l:'Hip-Hop'},{v:'Cinématographique',l:'Cinématographique'},
        {v:'Latin / Salsa',l:'Latin / Salsa'},{v:'Reggae',l:'Reggae'},
        {v:'Électronique / Dance',l:'Électronique / Dance'},{v:'Orchestre Gospel',l:'Orchestre Gospel'}
      ], grille:true },
    { section:'La musique', type:'choice', cle:'voice', requis:true,
      titre:'Quelle voix pour la chanter ?', aide:'La voix qui portera les mots.',
      options:[{v:'Féminin',l:'Voix féminine'},{v:'Masculin',l:'Voix masculine'}] },
    { section:'La musique', type:'choice', cle:'mood', requis:true,
      titre:'Quelle ambiance veux-tu ressentir ?', aide:'L’émotion générale de la chanson.',
      options:[
        {v:'Émotionnelle',l:'Émotionnelle'},{v:'Tendre',l:'Tendre'},{v:'Paisible',l:'Paisible'},
        {v:'Mélancolique',l:'Mélancolique'},{v:'Reconnaissante',l:'Reconnaissante'},
        {v:'Inspirante',l:'Inspirante'},{v:'Optimiste',l:'Optimiste'},{v:'Festive',l:'Festive'}
      ], grille:true },
    { section:'Les souvenirs', type:'text', cle:'what_made_unique', requis:true,
      titre:function(){return data.song_type==='cadeau'?'Qu’est-ce qui la rend unique ?':'Qu’est-ce qui la rendait unique ?';},
      aide:'Quelques mots suffisent : c’est le cœur de la chanson.',
      tipTitre:'Des pistes pour t’inspirer',
      tip:['Sa façon d’être avec les autres','Un trait de caractère qu’on n’oublie pas','Une passion qui la définissait'] },
    { section:'Les souvenirs', type:'text', cle:'memories', requis:false,
      titre:'Des souvenirs partagés à glisser dans la chanson ?',
      aide:'Un lieu, une habitude, un moment précis : les détails concrets font les plus belles lignes.',
      tipTitre:'Par exemple',
      tip:['Les étés au chalet','Sa recette du dimanche','Une chanson qu’on écoutait ensemble'] },
    { section:'Les souvenirs', type:'text', cle:'memory_to_keep', requis:false,
      titre:'Qu’est-ce qu’on veut garder et transmettre ?',
      aide:'Une phrase, une valeur, une promesse : elle trouvera sa place dans le refrain ou le pont.' },
    { section:'Dernière étape', type:'email', cle:'email', requis:true,
      titre:'Où t’envoyer la chanson ?',
      aide:'On t’écrit dès que les paroles sont prêtes, puis quand la chanson est créée.' }
  ];
  var SHOW_TOTAL_FROM=4, TOTAL=STEPS.length;

  /* ── Rendu générique d’une étape (même mécanique que la maquette) ── */
  var etape=1;
  var el={chip:document.getElementById('chip'),titre:document.getElementById('titre'),aide:document.getElementById('aide'),
    tip:document.getElementById('tip'),tipTitre:document.getElementById('tip-titre'),tipItems:document.getElementById('tip-items'),
    zone:document.getElementById('zone'),err:document.getElementById('erreur'),btn:document.getElementById('btn-suivant'),
    passer:document.getElementById('btn-passer'),retour:document.getElementById('btn-retour'),barre:document.getElementById('barre')};

  function texteDe(t){return typeof t==='function'?t():t;}
  function montrerErreur(msg){el.err.textContent=msg;el.err.classList.add('show');}
  function cacherErreur(){el.err.classList.remove('show');}
  function echap(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

  function rendre(){
    var s=STEPS[etape-1];
    cacherErreur();
    el.retour.disabled=(etape===1);
    el.barre.style.width=Math.round(((etape-1)/(TOTAL-1))*100)+'%';
    document.querySelector('.piste').setAttribute('aria-valuenow',etape);
    el.chip.textContent=s.section+' · '+(etape<SHOW_TOTAL_FROM?('étape '+etape):('étape '+etape+' sur '+TOTAL));
    el.titre.textContent=texteDe(s.titre);
    el.aide.textContent=texteDe(s.aide)||'';
    if(s.tip){el.tip.hidden=false;el.tipTitre.textContent=s.tipTitre||'Pour t’inspirer';
      el.tipItems.innerHTML=s.tip.map(function(t){return '<li>'+echap(t)+'</li>';}).join('');}
    else el.tip.hidden=true;
    el.passer.hidden=!!s.requis;
    el.btn.textContent=(etape===TOTAL)?'Créer mes paroles':'Continuer';

    if(s.type==='choice'){
      el.zone.innerHTML='<div class="choix'+(s.grille?' grille':'')+'" role="radiogroup">'+
        s.options.map(function(o){
          var actif=data[s.cle]===o.v?' actif':'';
          return '<label class="carte'+actif+'"><input type="radio" name="'+s.cle+'" value="'+echap(o.v)+'"'+(actif?' checked':'')+'><span>'+echap(o.l)+(o.sous?'<span class="sous">'+echap(o.sous)+'</span>':'')+'</span></label>';
        }).join('')+'</div>';
      [].forEach.call(el.zone.querySelectorAll('input[type=radio]'),function(r){
        r.addEventListener('change',function(){
          data[s.cle]=r.value;
          [].forEach.call(el.zone.querySelectorAll('.carte'),function(c){c.classList.remove('actif');});
          r.closest('.carte').classList.add('actif');
          cacherErreur();
        });
      });
    } else if(s.type==='name'){
      el.zone.innerHTML='<input type="text" id="champ" autocomplete="off" placeholder="'+echap(s.placeholder||'')+'" value="'+echap(data[s.cle]||'')+'">'+
        '<div class="note" id="note-mots">'+echap(s.noteMots||'')+'</div>';
      var inp=document.getElementById('champ');
      inp.addEventListener('input',function(){
        var mots=inp.value.trim().split(/\s+/).filter(Boolean);
        document.getElementById('note-mots').classList.toggle('show',mots.length>6);
      });
      inp.addEventListener('keydown',function(e){if(e.key==='Enter')el.btn.click();});
      inp.focus();
    } else if(s.type==='text'){
      el.zone.innerHTML='<textarea id="champ" placeholder="Écris comme ça vient : on s’occupe du reste."></textarea>';
      document.getElementById('champ').value=data[s.cle]||'';
    } else if(s.type==='email'){
      el.zone.innerHTML=
        '<input type="email" id="champ" autocomplete="email" inputmode="email" placeholder="ton@courriel.com" value="'+echap(data.email||'')+'">'+
        '<label for="input-language" class="legal" style="margin-top:6px">Langue de la chanson</label>'+
        '<select id="input-language">'+
          [['fr-CA','Français (Québec)'],['fr-FR','Français (France)'],['en','Anglais'],['es','Espagnol']].map(function(o){
            return '<option value="'+o[0]+'"'+(data.language===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+
        '</select>'+
        '<label class="consent"><input type="checkbox" id="consent"'+(data.consentement?' checked':'')+'>'+
          '<span>J’accepte les <a href="/condition-de-vente" target="_blank" rel="noopener">conditions</a> et la <a href="/politique-de-confidentialite" target="_blank" rel="noopener">politique de confidentialité</a>. Mes réponses servent uniquement à créer la chanson.</span></label>';
    }
    window.scrollTo(0,0);
  }

  function valider(){
    var s=STEPS[etape-1];
    if(s.type==='choice'){
      if(s.requis&&!data[s.cle]){montrerErreur('Choisis une option pour continuer.');return false;}
    } else if(s.type==='name'){
      var v=document.getElementById('champ').value.trim();
      if(v.length<MIN_CHARS){montrerErreur('Écris au moins le prénom (3 lettres minimum).');return false;}
      data[s.cle]=v;
    } else if(s.type==='text'){
      var t=document.getElementById('champ').value.trim();
      if(s.requis&&t.length<MIN_CHARS){montrerErreur('Quelques mots suffisent, mais il en faut un peu.');return false;}
      data[s.cle]=t;
    } else if(s.type==='email'){
      var email=document.getElementById('champ').value.trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){montrerErreur('Vérifie ton courriel : c’est là qu’on t’envoie la chanson.');return false;}
      if(!document.getElementById('consent').checked){montrerErreur('Coche la case de consentement pour continuer.');return false;}
      data.email=email;data.consentement=true;
      var l=document.getElementById('input-language');data.language=(l&&l.value)||'fr-CA';
    }
    return true;
  }

  el.btn.addEventListener('click',function(){
    if(!valider())return;
    if(etape<TOTAL){etape++;rendre();return;}
    soumettre();
  });
  el.passer.addEventListener('click',function(){
    var s=STEPS[etape-1];
    var champ=document.getElementById('champ');
    data[s.cle]=champ?champ.value.trim():'';
    etape++;rendre();
  });
  el.retour.addEventListener('click',function(){if(etape>1){etape--;rendre();}});

  function soumettre(){
    /* Caractères de contrôle neutralisés côté client (le serveur re-nettoie : ceinture + bretelles).
       Les guillemets/apostrophes RESTENT intacts : tout est paramétré côté Supabase. */
    Object.keys(data).forEach(function(k){
      if(typeof data[k]==='string')data[k]=data[k].replace(/[\x00-\x1F\x7F]+/g,' ').trim();
    });
    el.btn.disabled=true;el.btn.textContent='Envoi en cours…';

    /* Backup Netlify Forms : contenu seulement, jamais l’attribution (Loi 25). */
    var BACKUP=['token','song_type','deceased_name','relationship','music_style','voice','mood','language','what_made_unique','memories','memory_to_keep','email','consentement'];
    var fd=new FormData();fd.append('form-name','chanson-memoire-survey');
    BACKUP.forEach(function(k){fd.append(k,data[k]);});
    fetch('/',{method:'POST',body:fd}).catch(function(){});

    fetch('/api/survey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
      .then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        if(window.cmSetNoTrack)window.cmSetNoTrack(data.email);
        if(window.cmTrack)window.cmTrack('Lead','lead',token);
        window.location.href='/attente-paroles?id='+encodeURIComponent(token);
      })
      .catch(function(){
        el.btn.disabled=false;el.btn.textContent='Créer mes paroles';
        montrerErreur('L’envoi n’a pas fonctionné. Réessaie dans un instant : tes réponses sont conservées ici.');
      });
  }

  window.addEventListener('pageshow',function(e){if(e.persisted)location.reload();});
  rendre();
})();
</script>
