[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Identifiants PUBLICS (pas des secrets) exclus du scanner de secrets Netlify, qui sinon fait échouer
  # le build en les trouvant dans la sortie :
  #   - CLOUDINARY_CLOUD_NAME : nom public Cloudinary (dans toutes les URLs d'assets, ex. index.html).
  #   - META_AD_ACCOUNT_ID    : identifiant de compte pub Meta (act_…), pas une clé.
  #   - META_DATASET_ID       : = le Pixel ID Meta, écrit EN CLAIR dans cm-pixel.js/index.html (pixel navigateur).
  # Les vrais secrets (META_MARKETING_TOKEN, META_CAPI_TOKEN, AIRTABLE_TOKEN, ANTHROPIC_API_KEY…) restent SCANNÉS.
  SECRETS_SCAN_OMIT_KEYS = "CLOUDINARY_CLOUD_NAME,META_AD_ACCOUNT_ID,META_DATASET_ID"

# Séquence marketing « rattrapage » : moteur planifié (toutes les heures).
[functions."nurture-cron"]
  schedule = "@hourly"

# Sentinelle : récupère/relance les chansons bloquées (interroge Suno, régénère si vrai échec). Toutes les 30 min.
[functions."sentinelle-cron"]
  schedule = "*/30 * * * *"

# Alerte 10h : courriel interne si une chanson reste bloquée >10h. Toutes les heures.
[functions."alerte-cron"]
  schedule = "@hourly"

# Récupération client (#4/#7) : relance les paroles échouées + envoie le lien (paroles ou chanson)
# dès que c'est prêt, aux projets marqués recovery_pending. Toutes les 5 min (le client attend).
[functions."recovery-cron"]
  schedule = "*/5 * * * *"

# Purge Loi 25 : supprime les fichiers audio des projets NON achetés à 60 j, anonymise leurs PII
# à 6 mois. Les projets achetés ne sont JAMAIS touchés. DRY-RUN par défaut (journalise sans rien
# supprimer) ; purge réelle seulement si PURGE_ACTIF=1. Quotidien.
[functions."purge-cron"]
  schedule = "@daily"

# Relance cover + refaire/régénérer (dropdown `refaire`) : chaque minute (quasi instantané).
[functions."cover-cron"]
  schedule = "* * * * *"

# Envoi des réponses support : expédie les conversations cochées « envoyer ». Chaque minute (réactif).
[functions."envoyer-cron"]
  schedule = "* * * * *"

# Brouillons IA support : rédige les réponses des conversations en file (découplé de la réception ->
# aucun courriel perdu ; auto-réparant si Anthropic est en panne). Chaque minute.
[functions."brouillon-cron"]
  schedule = "* * * * *"

# Pré-génération paroles + prompt des demandes de modification non passées par decortique (pré-achat /
# courriels). Découplé, auto-réparant. Chaque minute.
[functions."modif-cron"]
  schedule = "* * * * *"

# Application des modifications : traite les conversations cochées « appliquer » (pousse vers le Projet +
# relance Suno via refaire). Chaque minute (réactif).
[functions."appliquer-cron"]
  schedule = "* * * * *"

# Moteur multi-séquences (Bienvenue post-achat, puis parrainage/cross-sell) via la table Inscriptions. Horaire.
[functions."sequences-cron"]
  schedule = "@hourly"

# Rattrapage jointure Projet<->Pub (first_pub + last_pub) : lie les Projets dont la Pub n'existait pas
# encore au moment de la conversion (Insights tire la dépense Meta sur un cycle). Remplace Make « Jointure
# Pub/Hook ». Idempotent (ne pose que les liens manquants). Horaire.
[functions."pub-join-cron"]
  schedule = "@hourly"

# Insights Meta : tire la dépense/diffusion par pub (API Marketing) -> Pubs + Pubs_Performance. Remplace
# le scénario Make « Insights » (4796178). INERTE tant que META_AD_ACCOUNT_ID / META_MARKETING_TOKEN ne
# sont pas posées en env. Chaque heure (fenêtre last_3d, upsert idempotent par perf_key ; API Meta gratuite).
[functions."insights-cron"]
  schedule = "@hourly"

# Canari (synthetic monitoring) : rejoue les points critiques (CAPI Meta, Airtable, Insights) et alerte
# (courriel + Sentry) au moindre echec, avant que des vrais clients tombent dessus. Toutes les 15 min.
[functions."canari-cron"]
  schedule = "*/15 * * * *"

# Canari DATA-QUALITY (lecture seule) : alerte si un Projet recent a atteint le funnel SANS Lead CAPI
# (capi_lead_sent) -> detecte un bug de tracking silencieux. Horaire.
[functions."canari-data-cron"]
  schedule = "@hourly"

# Canari END-TO-END : rejoue une vraie soumission de sondage (canari -> sans Lead CAPI), verifie
# l'ecriture (Client/Projet/attribution/Generation), PUIS supprime les donnees test. Alerte si echec.
# 1x/jour (8h UTC ~ 4h Quebec) : chaque run genere des paroles via Anthropic -> on limite le cout.
[functions."e2e-canari-cron"]
  schedule = "0 8 * * *"

# Watchdog livrables add-on : récupère / relance / alerte les rendus bloqués (instrumentale Suno,
# vidéo mémoire + paroles vivantes Creatomate) -> plus de bug silencieux sur les add-ons PAYANTS.
# Interroge les fournisseurs (statut = lecture, 0 crédit). Toutes les 30 min (comme la sentinelle ;
# cap 20 -> ~10h avant alerte, aligné sur l'alerte 10h des chansons).
[functions."watchdog-cron"]
  schedule = "*/30 * * * *"

# Keep-warm (anti cold-start) : ping leger (GET -> 405, 0 effet de bord) sur les fonctions vues par le
# client au chargement d'une page (lire-projet, lire-versions) -> un lien courriel/redirection tombe sur
# un conteneur deja chaud (~0,3 s) au lieu d'un demarrage a froid (plusieurs secondes). Cout fixe ~26k
# invocations/mois, a retirer quand le vrai trafic suffira. Cf. keepwarm-cron.js + lazy-Sentry. Toutes les 5 min.
[functions."keepwarm-cron"]
  schedule = "*/5 * * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
