<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<script src="/js/cm-token.js"></script>
<title>Un instant · Chanson Mémoire</title>
<!-- RÉSOLVEUR D'ÉTAPE (nouveau funnel 2026-07-02) : la page révision n'existe plus
     comme étape (la révision des paroles vit sur l'aperçu, après écoute). Les anciens
     liens /revision (courriels déjà envoyés) redirigent vers l'étape COURANTE du
     client : aperçu prêt -> /apercu, acheté -> /espace-client, sinon -> /attente-paroles. -->
<script src="/js/cm-sentry.js"></script>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F7F3EE;font-family:system-ui,sans-serif;color:#8A7F88}
</style>
</head>
<body>
<p>Un instant, on t’amène à la bonne étape…</p>
<script>
(function(){
  'use strict';
  var UUID_V4=/^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
  var token=((window.cmToken?window.cmToken():(new URLSearchParams(window.location.search).get('id')))||'').trim();
  if(!UUID_V4.test(token)){ window.location.replace('/souvenirs'); return; }
  fetch('/api/projet?id='+encodeURIComponent(token),{headers:{accept:'application/json'}})
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(p){
      var q='?id='+encodeURIComponent(token);
      if(!p){ window.location.replace('/souvenirs'); return; }
      if(p.statut_commercial && p.statut_commercial!=='preview_only'){ window.location.replace('/espace-client'+q); return; }
      if(p.etape==='preview_ready'){ window.location.replace('/apercu'+q); return; }
      window.location.replace('/attente-paroles'+q);
    })
    .catch(function(){ window.location.replace('/attente-paroles?id='+encodeURIComponent(token)); });
})();
</script>
</body>
</html>
